name: Publish to Homey

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Compose .homeycompose/* into the generated app.json — the
      # validate action fails with "no app.json" otherwise. We don't
      # commit the generated app.json (it'd churn on every source edit).
      - run: npx --yes homey app build
      - name: Validate
        uses: athombv/github-action-homey-app-validate@master
        with:
          level: publish
      - name: Publish
        id: publish
        uses: athombv/github-action-homey-app-publish@master
        with:
          personal_access_token: ${{ secrets.HOMEY_PAT }}
      - name: Summary
        run: echo "Published to ${{ steps.publish.outputs.url }}" >> $GITHUB_STEP_SUMMARY
