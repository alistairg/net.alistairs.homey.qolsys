<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      color: #333;
    }
    h2 { margin-top: 0; }
    label { display: block; margin-bottom: 4px; font-weight: 500; }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin: 4px 0 16px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #2a2a4e; }
    .error { color: #c00; margin-top: 8px; display: none; }
    .instructions {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 16px;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h2>Qolsys IQ Panel</h2>

  <div class="instructions">
    <strong>Before pairing:</strong><br>
    On your Qolsys panel, go to:<br>
    <em>Settings &rarr; Advanced Settings &rarr; Installation &rarr; Devices &rarr; Wi-Fi Devices &rarr; IQ Remote Devices</em><br>
    Then tap <strong>Pair New Device</strong>.
  </div>

  <label for="panelIp">Panel IP Address</label>
  <input type="text" id="panelIp" placeholder="192.168.1.100" autofocus />

  <p class="error" id="error"></p>
  <button id="next">Start Pairing</button>

  <script>
    var panelIpInput = document.getElementById('panelIp');
    var errorEl = document.getElementById('error');
    var nextBtn = document.getElementById('next');

    function doNext() {
      var panelIp = panelIpInput.value.trim();
      if (!panelIp) {
        errorEl.textContent = 'Please enter the panel IP address.';
        errorEl.style.display = 'block';
        return;
      }

      errorEl.style.display = 'none';

      Homey.emit('configure', {
        panelIp: panelIp
      }).then(function() {
        Homey.showView('pairing');
      }).catch(function(err) {
        errorEl.textContent = err.message || 'Configuration error.';
        errorEl.style.display = 'block';
      });
    }

    nextBtn.addEventListener('click', doNext);
    panelIpInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doNext();
    });
  </script>
</body>
</html>
